<!DOCTYPE html>
<html>
<head>
    <title>StudyConnect Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            text-align: center;

            /* ✅ CAMPUS BACKGROUND IMAGE */
            background: url("campus.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            color: #222;
        }

        /* 🔥 DARK OVERLAY FOR READABILITY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            /* adjust darkness here */
            background: rgba(255, 255, 255, 0.75);

            z-index: 0;
        }

        h1 {
            margin-top: 20px;
            color: #0d47a1;
            position: relative;
            z-index: 1;
        }

        .box {
            width: 420px;
            margin: auto;
            background: rgba(255, 255, 255, 0.95);

            padding: 25px;
            margin-top: 40px;
            border-radius: 12px;

            box-shadow: 0px 6px 18px rgba(0,0,0,0.15);

            position: relative;
            z-index: 1;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 14px;
            margin: 6px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #1a73e8;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #0f5bd5;
        }

        #registerDiv {
            display: none;
        }

        /* ⭐ RESULT CARDS (HIGHLIGHTED ABOVE BACKGROUND) */
        #result {
            position: relative;
            z-index: 1;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 18px;
            margin: 12px auto;
            border-radius: 12px;

            width: 420px;

            box-shadow: 0px 8px 20px rgba(0,0,0,0.25);

            text-align: left;
            color: #111;

            border-left: 6px solid #1a73e8;
        }

        .card:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

    </style>
</head>

<body>

<h1>🎓 Presidency University Bangalore</h1>

<div class="box">

    <!-- LOGIN -->
    <div id="loginDiv">
        <h2>Login</h2>

        <select id="roleLogin">
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
        </select>

        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="showRegister()">Register</button>
    </div>

    <!-- REGISTER -->
    <div id="registerDiv">
        <h2>Register</h2>

        <select id="roleReg">
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
        </select>

        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="password" placeholder="Password">
        <input id="contact" placeholder="Contact">
        <input id="skills" placeholder="Skills (comma separated)">
        <input id="interest" placeholder="Interest">
        <input id="projects" placeholder="Projects">

        <button onclick="register()">Submit</button>
        <button onclick="showLogin()">Back</button>
    </div>

</div>

<!-- RESULT -->
<div id="result"></div>

<script>

let currentRole = "";
let currentEmail = "";

// SWITCH UI
function showRegister(){
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("registerDiv").style.display = "block";
}

function showLogin(){
    document.getElementById("registerDiv").style.display = "none";
    document.getElementById("loginDiv").style.display = "block";
}

// REGISTER
function register(){

fetch("http://127.0.0.1:5000/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
role: document.getElementById("roleReg").value,
name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
contact: document.getElementById("contact").value,
skills: document.getElementById("skills").value,
interest: document.getElementById("interest").value,
projects: document.getElementById("projects").value
})
})
.then(res=>res.json())
.then(data=>{
alert(data.msg);
showLogin();
});
}

// LOGIN
function login(){

currentRole = document.getElementById("roleLogin").value;
currentEmail = document.getElementById("loginEmail").value;

fetch("http://127.0.0.1:5000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
role: currentRole,
email: currentEmail,
password: document.getElementById("loginPassword").value
})
})
.then(res=>res.json())
.then(data=>{
if(data.error){
    alert(data.error);
    return;
}

loadMatches();

});
}

// MATCHES
function loadMatches(){

fetch("http://127.0.0.1:5000/match",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
role: currentRole,
email: currentEmail
})
})
.then(res=>res.json())
.then(data=>{

let html = "<h2>Matches</h2>";

data.forEach(d=>{

html += `
<div class="card">
<b>Name:</b> ${d.name}<br>
<b>Email:</b> ${d.email}<br>
<b>Contact:</b> ${d.contact}<br>
<b>Skills:</b> ${d.skills}<br>
<b>Interest:</b> ${d.interest}<br>
<b>Projects:</b> ${d.projects}<br>
<b>Score:</b> <span style="color:green">${d.score}</span><br>
<b>Suggestion:</b> <span style="color:blue">${d.suggestion}</span>
</div>
`;

});

document.getElementById("result").innerHTML = html;

});
}

</script>

</body>
</html>
